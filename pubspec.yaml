name: lingocode
description: "LingoCode — learn English and Python with spaced repetition and interactive exercises."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local storage
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqflite_common_ffi_web: ^0.4.5+3
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5

  # State management (lightweight)
  provider: ^6.1.2

  # JSON
  json_annotation: ^4.9.0

  # Code highlighting for Python exercises
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
